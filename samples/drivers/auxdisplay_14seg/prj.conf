CONFIG_LOG=y
CONFIG_AUXDISPLAY=y
CONFIG_AUXDISPLAY_GH08172T=y
CONFIG_AUXDISPLAY_LOG_LEVEL_DBG=y

# Added automatically by Workbench for Zephyr
